name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - VoiceMate
          - MemoEase

jobs:
  build:
    name: Build ${{ github.event.inputs.app }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Swift
        working-directory: ${{ github.event.inputs.app }}
        run: |
          swift build -c release

      - name: List Outputs
        run: |
          ls -la ${{ github.event.inputs.app }}/.build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app }}-build
          path: ${{ github.event.inputs.app }}/.build/