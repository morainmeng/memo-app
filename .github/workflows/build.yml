name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - VoiceMate
          - MemoEase

jobs:
  build:
    name: Build ${{ github.event.inputs.app }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ github.event.inputs.app }}
        run: |
          cd ${{ github.event.inputs.app }}
          xcodebuild -project Package.swift -scheme ${{ github.event.inputs.app }} -configuration Release -destination 'generic/platform=iOS' build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app }}-ipa
          path: build/Build/Products/Release-iphoneos/*.app