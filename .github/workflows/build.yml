name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - VoiceMate
          - MemoEase

jobs:
  build:
    name: Build ${{ github.event.inputs.app }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Swift
        run: |
          cd ${{ github.event.inputs.app }}
          swift build -c release

      - name: Create Archive
        run: |
          cd ${{ github.event.inputs.app }}
          PRODUCT_NAME=${{ github.event.inputs.app }}
          mkdir -p build/Build/Products/Release-iphoneos
          swift build -c release -Xswiftc -static-stdlib | tee build.log || true
          # Check if build succeeded
          if grep -q "Linking" build.log; then
            echo "Build completed"
            ls -la .build/release/
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app }}-build
          path: ${{ github.event.inputs.app }}/.build/